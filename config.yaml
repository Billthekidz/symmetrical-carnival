# Polymarket Watcher — sample configuration
# Copy this file, adjust the values, and pass the path as the first argument
# to the service, or place it at the repository root as config.yaml.

# ── Account (primary) ──────────────────────────────────────────────────────
# Set your proxy wallet address to auto-discover all open positions.
# When non-empty the service ignores the [market] section entirely.
account:
  proxy_wallet: ""   # e.g. "0xYourProxyWalletHere"

# ── Manual fallback ────────────────────────────────────────────────────────
# Used only when proxy_wallet is empty.  Fill in the market you want to watch
# along with your entry details so the position-aware watchers can work.
market:
  # URL slug of the Polymarket event to watch.
  # Example: for https://polymarket.com/event/will-trump-win-in-2024
  #          the slug is "will-trump-win-in-2024"
  slug: "will-trump-win-in-2024"

  # Direction to monitor. Accepted values:
  #   "yes" or "long"  — monitors the YES outcome token (bullish bias)
  #   "no"  or "short" — monitors the NO outcome token  (bearish bias)
  direction: "yes"

  # Your average entry price (0–1 scale, e.g. 0.72 means 72¢).
  # Required for position-aware watchers when using the manual fallback.
  entry_price: 0.0

  # Number of shares you hold.
  # Required for position-aware watchers when using the manual fallback.
  position_size: 0.0

watcher:
  # ── Bid-floor watcher ───────────────────────────────────────────────────
  # Monitors whether the total resting bid volume within a configurable window
  # below your entry price is at least safety_multiple × your position size.
  # Fires when it drops below that level, then re-arms once the ratio recovers.
  bid_floor:
    enabled: true
    safety_multiple: 10.0   # alert when platform < 10 × position_size
    # Only bids within this percentage below the entry price count as support.
    # e.g. 10.0 means bids from entry_price × 0.90 up to entry_price are scanned.
    # Bids far below the entry level provide little real structural protection.
    floor_window_pct: 10.0

  # ── Value watcher ───────────────────────────────────────────────────────
  # Tracks your position's current market value (best_bid × size) as a
  # percentage of your entry cost (avg_price × size).  Fires a one-shot alert
  # each time the value drops through a threshold.
  value:
    enabled: true
    alert_thresholds: [90.0, 80.0, 70.0, 60.0]   # % of entry cost remaining

service:
  log_level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  reconnect_delay_sec: 5.0   # seconds to wait before reconnecting after an error

actions:
  log:
    enabled: true   # Log detected events to stdout (placeholder for richer actions)

  # ── Discord outbound webhook ────────────────────────────────────────────────
  # Sends an alert message to a Discord channel when a watcher fires.
  # The webhook URL is NOT stored here — place it in the secrets file:
  #   /etc/polymarket-watcher/secrets.env  (DISCORD_WEBHOOK_URL=https://…)
  # See secrets.env.example for the template.
  discord:
    enabled: false

