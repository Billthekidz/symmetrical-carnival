# Polymarket Watcher — sample configuration
# Copy this file, adjust the values, and pass the path as the first argument
# to the service, or place it at the repository root as config.yaml.

market:
  # URL slug of the Polymarket event to watch.
  # Example: for https://polymarket.com/event/will-trump-win-in-2024
  #          the slug is "will-trump-win-in-2024"
  slug: "will-trump-win-in-2024"

  # Direction to monitor. Accepted values:
  #   "yes" or "long"  — monitors the YES outcome token (bullish bias)
  #   "no"  or "short" — monitors the NO outcome token  (bearish bias)
  direction: "yes"

watcher:
  price_support:
    enabled: true

    # Count bids whose price is within this many percent of the best bid
    # as "supporting" the price level.
    threshold_pct: 5.0

    # Fire an alert when total support drops by at least this percentage
    # since the last measurement.
    alert_drop_pct: 20.0

service:
  log_level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  reconnect_delay_sec: 5.0   # seconds to wait before reconnecting after an error

actions:
  log:
    enabled: true   # Log detected events to stdout (placeholder for richer actions)
