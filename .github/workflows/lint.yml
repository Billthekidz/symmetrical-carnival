# Lint every pull request with ruff.
#
# Results appear as inline annotations on the PR diff so reviewers can see
# exactly which lines need attention without leaving GitHub.
#
# The job is informational — it does NOT block merges.  Adjust
# `continue-on-error` to `false` if you want lint failures to block PRs.

name: Lint

on:
  pull_request:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so ruff can post inline annotations on the PR.
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (annotations)
        # --output-format github emits ::error file=…,line=…,col=…:: messages
        # that GitHub Actions renders as inline PR annotations.
        run: ruff check . --output-format github
        continue-on-error: true   # warn, don't block the PR
