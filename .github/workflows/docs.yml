# Build the Sphinx documentation and publish it to GitHub Pages.
#
# Runs automatically on every push to main, and can also be triggered
# manually from the Actions tab (workflow_dispatch).
#
# GitHub Pages must be configured to use "GitHub Actions" as the source:
#   Repository → Settings → Pages → Source → GitHub Actions

name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install documentation dependencies
        run: |
          pip install -r requirements.txt
          pip install -r docs/requirements.txt

      - name: Build HTML docs with Sphinx
        run: sphinx-build -b html docs/ docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
