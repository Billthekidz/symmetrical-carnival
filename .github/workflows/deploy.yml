# Deploy the main branch to a DigitalOcean Droplet.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   DO_SSH_PRIVATE_KEY   – Private SSH key whose public half is in the
#                          droplet's ~/.ssh/authorized_keys.
#   DO_HOST              – Droplet IP address or hostname (e.g. 198.51.100.10).
#   DO_USER              – SSH user on the droplet (e.g. "root" or "deploy").
#
# Optional Secret:
#   DO_PORT              – SSH port (defaults to 22 when not set).
#
# The workflow:
#   1. Runs the test suite – a failing test blocks the deploy.
#   2. Uploads the source code to a unique release directory on the droplet.
#   3. Switches the /opt/polymarket-watcher/current symlink to the new release.
#   4. Installs/updates dependencies using the shared venv, then restarts the
#      systemd service.
#   5. Prunes old releases, keeping the last 5.

name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  # ── Job 1: run tests ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # ── Job 2: deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      BASE_DIR: /opt/polymarket-watcher
      RELEASES_DIR: /opt/polymarket-watcher/releases
      RELEASE_DIR: /opt/polymarket-watcher/releases/${{ github.sha }}
      CURRENT_DIR: /opt/polymarket-watcher/current

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload source code to release directory via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ vars.DO_HOST }}
          username: ${{ vars.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: ${{ vars.DO_PORT || 22 }}
          source: "."
          target: "${{ env.RELEASE_DIR }}"
          rm: false

      - name: Switch symlink, install dependencies, and restart service
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.DO_HOST }}
          username: ${{ vars.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: ${{ vars.DO_PORT || 22 }}
          script: |
            BASE_DIR="/opt/polymarket-watcher"
            RELEASES_DIR="$BASE_DIR/releases"
            RELEASE_DIR="$RELEASES_DIR/${{ github.sha }}"
            CURRENT_DIR="$BASE_DIR/current"

            # ── Ensure shared virtualenv exists ────────────────────────────
            if [ ! -f "$BASE_DIR/.venv/bin/pip" ]; then
              python3 -m venv "$BASE_DIR/.venv"
            fi

            # ── Install / update Python dependencies before going live ─────
            "$BASE_DIR/.venv/bin/pip" install --quiet -r "$RELEASE_DIR/requirements.txt"

            # ── Switch symlink atomically to the new release ───────────────
            ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"

            # ── Reload and restart the systemd service ─────────────────────
            sudo systemctl daemon-reload
            sudo systemctl restart polymarket-watcher
            sudo systemctl status polymarket-watcher

            # ── Prune old releases, keep the last 5 ───────────────────────
            ls -1dt "$RELEASES_DIR"/*/  | tail -n +6 | xargs -r rm -rf
